<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>cart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1391116205.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mate:ital@0;1&display=swap" rel="stylesheet">

<body>
    <header>
        <nav>
            <div>
                <!-- <h2>Bite<span style="color: red;">Box</span></h2> -->
                 <img src="images/bitebox5.png" width="180px"/>
                <ul type="none">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>

        </nav>

    <section class="cart">
        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>
            <tbody>
                <tr>
                    <td class="item">
                        <img src="images/Menu/burger.png" alt="burger">
                        <div>
                            <h3>Burger</h3>
                            <p>Cheesy Burger</p>
                        </div>
                    </td>
                    <td>₹199</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>
                        ₹199
                    </td>
                    <td>
                        <button class="remove">X</button>
                    </td>
                </tr>

                <tr>
                    <td class="item">
                        <img src="images/Menu/Cheesy_pizza.png" alt="pizza">
                        <div>
                            <h3>pizza</h3>
                            <p>Cheesy pizza with fresh Capsicum</p>
                        </div>
                    </td>
                    <td>₹249</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>
                        ₹249
                    </td>
                    <td>
                        <button class="remove">X</button>
                    </td>
                </tr>
                <tr>
                    <td class="item">
                        <img src="images/Menu/burger.png" alt="burger">
                        <div>
                            <h3>Burger</h3>
                            <p>Cheesy Burger</p>
                        </div>
                    </td>
                    <td>₹199</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>
                        ₹199
                    </td>
                    <td>
                        <button class="remove">X</button>
                    </td>
                </tr>
                <tr class="grand-total"> 
                    <td colspan="3">Grand Total</td>
                    <td>₹199</td>
                    <td><button>Proceed</button></td>
                </tr>
            </tbody>
        </table>
    </section>

</body>
</html>
