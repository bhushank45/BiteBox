<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1391116205.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mate:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div>
                <!-- <h2>Bite<span style="color: red;">Box</span></h2> -->
                 <img src="images/bitebox5.png" width="180px"/>
                <ul type="none">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="bitedeals.html">BiteDeals</a></li>
                    <li><a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a></li>
                    <li><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="category-icons">
        <div class="icon-box">
            <img src="images/Menu/ricebowl.png"/>
            <p>All</p>
        </div>
        <div class="icon-box">
            <img src="images/Menu/burger.png"/>
            <p>Burger</p>
        </div>
        <div class="icon-box">
            <img src="images/Menu/Cheesy_pizza.png"/>
            <p>Pizza</p>
        </div>
        <div class="icon-box">
            <img src="images/Menu/pasta.png"/>
            <p>Pasta</p>
        </div>
        <div class="icon-box">
            <img src="images/Menu/fries.png"/>
            <p>Fries</p>
        </div>
    </div>

    <section class="menu">
        <h2>Our Menu</h2>
        <div class="menu_container">
            <div class="card">
                <img src="images/Menu/burger.png"/>
                <h3>Burger</h3>
                <p>Cheesy Burger</p>
                <span>₹199</span>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/Menu/Capsicum_pizza.png"/>
                <h3>Capsicum Pizza</h3>
                <p>Cheesy pizza with fresh Capsicum</p>
                <span>₹249</span>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/Menu/paneer_pizza.png"/>
                <h3>Paneer Tikka Pizza</h3>
                <p>Loaded With Spicy Chunk of Paneer</p>
                <span>₹399</span>
                <button>Add to Cart</button>
            </div>
            <div class="card">
                <img src="images/Menu/pasta.png"/>
                <h3>Pasta</h3>
                <p>Cream cheesy Pasta</p>
                <span>₹249</span>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>
</body>
</html>
